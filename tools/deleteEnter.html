<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>去除回车并复制</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #f0f4f8 0%, #e6ecf2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 1rem;
            margin: 0;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            background: #ffffffdd;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 20, 30, 0.25), 0 2px 8px rgba(0,0,0,0.03);
            padding: 2.2rem 2rem;
            transition: box-shadow 0.2s ease;
            border: 1px solid #ffffff50;
        }

        .card:hover {
            box-shadow: 0 30px 55px -10px rgba(18, 52, 77, 0.3);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0b2b3b;
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .sub {
            color: #3f5462;
            font-size: 0.95rem;
            margin-bottom: 1.8rem;
            border-left: 3px solid #3b8fc2;
            padding-left: 1rem;
            background: #eef5f9;
            border-radius: 0 1rem 1rem 0;
            line-height: 1.4;
            width: fit-content;
            padding: 0.5rem 1rem 0.5rem 1rem;
        }

        .input-area {
            margin-bottom: 1.8rem;
        }

        label {
            font-weight: 500;
            font-size: 0.95rem;
            color: #1d3e53;
            display: block;
            margin-bottom: 0.4rem;
        }

        textarea, input {
            font-family: inherit;
        }

        #inputText {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            border: 2px solid #dae4ec;
            border-radius: 1.5rem;
            background: #ffffff;
            resize: vertical;
            min-height: 160px;
            max-height: 350px;
            line-height: 1.5;
            transition: border 0.2s, box-shadow 0.2s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }

        #inputText:focus {
            border-color: #2e7ea1;
            outline: none;
            box-shadow: 0 0 0 4px rgba(46, 126, 161, 0.15);
        }

        .preview-wrap {
            margin: 1.8rem 0 1.5rem 0;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.4rem;
        }

        .preview-header span {
            font-size: 0.9rem;
            font-weight: 500;
            color: #1d3e53;
        }

        .char-count {
            color: #2e5f7a;
            background: #e2ebf3;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 450;
        }

        #preview {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            border: 2px dashed #b3c9da;
            border-radius: 1.5rem;
            background: #f5faff;
            resize: vertical;
            min-height: 90px;
            max-height: 180px;
            line-height: 1.5;
            color: #1c3d51;
            outline: none;
            cursor: default;
            transition: background 0.15s;
        }

        #preview:focus {
            border-color: #2e7ea1;
            background: #edf5fc;
        }

        .button-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            margin: 0 0 1.5rem 0;
        }

        .primary-btn {
            background: #176f9e;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            padding: 0.9rem 2.2rem;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 10px 18px -8px #0f4b6b;
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            letter-spacing: 0.3px;
            border: 1px solid #2f8bbf;
            flex: 1 1 auto;
        }

        .primary-btn:hover {
            background: #0e5a82;
            box-shadow: 0 15px 22px -10px #0b3f58;
            transform: scale(1.01);
        }

        .primary-btn:active {
            transform: scale(0.98);
            background: #0b4a6b;
            box-shadow: 0 5px 12px -6px #0b3f58;
        }

        .status-box {
            background: #eaf1f7;
            border-radius: 3rem;
            padding: 0.8rem 1.6rem;
            font-size: 0.95rem;
            color: #1b3f55;
            border-left: 5px solid #3b8fc2;
            word-break: break-word;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: inset 0 1px 3px #ffffff, 0 2px 4px rgba(0,0,0,0.02);
            min-height: 3.5rem;
        }

        .status-icon {
            font-size: 1.3rem;
            line-height: 1;
        }

        .status-message {
            flex: 1;
        }

        .footnote {
            font-size: 0.8rem;
            color: #5b6f7e;
            margin-top: 0.8rem;
            text-align: right;
            border-top: 1px solid #d1dee9;
            padding-top: 0.8rem;
        }

        .footnote code {
            background: #e3eaf1;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.75rem;
        }

        /* 移动端微调 */
        @media (max-width: 450px) {
            .card {
                padding: 1.8rem 1.2rem;
            }
            .primary-btn {
                width: 100%;
                font-size: 1.1rem;
                padding: 0.8rem 1.5rem;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>⏎ 去除回车 · 复制</h1>
    <div class="sub">粘贴含换行符的文本，一键去除所有 \n \r 并复制纯净内容</div>

    <!-- 原始输入框 -->
    <div class="input-area">
        <label for="inputText">📋 原始内容 (可包含多行)</label>
        <textarea id="inputText" placeholder="贴上你的文本，例如：&#10;第一行&#10;第二行&#10;第三行" spellcheck="false"></textarea>
    </div>

    <!-- 预览区域 (只读，显示去除回车后的内容) -->
    <div class="preview-wrap">
        <div class="preview-header">
            <span>🔍 预览 (已去除回车)</span>
            <span class="char-count" id="previewCount">0 字符</span>
        </div>
        <textarea id="preview" rows="3" readonly spellcheck="false" placeholder="去除回车后的效果将实时预览..." wrap="soft"></textarea>
    </div>

    <!-- 按钮 + 状态区 -->
    <div class="button-area">
        <button class="primary-btn" id="copyBtn">📋 去除回车并复制</button>
    </div>

    <div class="status-box" id="statusBox">
        <span class="status-icon" id="statusIcon">⚡</span>
        <span class="status-message" id="statusMessage">就绪，输入内容后点击按钮</span>
    </div>

    <div class="footnote">
        <code>⏎ 回车符(CR/LF) 将被彻底删除</code>  ·  点击按钮自动复制预览内容
    </div>
</div>

<script>
    (function() {
        // DOM 元素
        const inputTextarea = document.getElementById('inputText');
        const previewTextarea = document.getElementById('preview');
        const copyBtn = document.getElementById('copyBtn');
        const statusIcon = document.getElementById('statusIcon');
        const statusMessage = document.getElementById('statusMessage');
        const previewCount = document.getElementById('previewCount');

        // 去除回车的正则：匹配 \r \n 以及 \r\n (统一移除)
        const REMOVE_NEWLINES_REGEX = /[\r\n]+/g;

        // 工具函数：更新预览区域 + 字符数
        function updatePreviewFromInput() {
            const rawText = inputTextarea.value;
            // 去除所有回车（包括 \n \r）
            const cleanText = rawText.replace(REMOVE_NEWLINES_REGEX, '');
            previewTextarea.value = cleanText;
            // 更新字符计数
            const charCount = cleanText.length;
            previewCount.textContent = charCount + ' 字符';
            return cleanText; // 方便链式调用
        }

        // 初始化：实时监听输入框变化，预览立即刷新
        inputTextarea.addEventListener('input', updatePreviewFromInput);

        // 页面加载时也执行一次，保证初始预览一致（如果已有占位内容，但占位不会触发input）
        (function initPreview() {
            // 但用户可能还没输入，预览为空，字符计数为0 —— 符合预期。
            // 如果希望预览显示输入框placeholder的效果？placeholder不是实际值，所以预览保持空白即可。
            // 但为了统一，调用一下确保计数归零。
            updatePreviewFromInput();
        })();

        // ---------- 复制核心函数 (支持降级) ----------
        function copyTextToClipboard(text, onSuccess, onError) {
            // 优先使用现代 Clipboard API
            if (navigator.clipboard && window.isSecureContext) {   // secure context 要求 https 或 localhost
                navigator.clipboard.writeText(text).then(() => {
                    onSuccess && onSuccess();
                }).catch(err => {
                    // API 调用失败 (权限或其它), 尝试降级
                    fallbackCopy(text, onSuccess, onError);
                });
            } else {
                // 不支持 Clipboard API 或 非安全环境 -> 使用传统方法
                fallbackCopy(text, onSuccess, onError);
            }

            inputTextarea.value = "";
        }

        function fallbackCopy(text, onSuccess, onError) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            // 防止页面滚动
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            textarea.style.top = '0';
            textarea.style.opacity = '0';
            textarea.setAttribute('readonly', '');
            document.body.appendChild(textarea);
            textarea.focus({ preventScroll: true });  // 避免滚动
            textarea.select();

            let successful = false;
            try {
                successful = document.execCommand('copy');
                if (successful) {
                    onSuccess && onSuccess();
                } else {
                    onError && onError(new Error('execCommand 复制失败 (fallback)'));
                }
            } catch (err) {
                onError && onError(err);
            } finally {
                document.body.removeChild(textarea);
            }
        }

        // 更新状态UI (成功/失败/信息)
        function setStatus(type, message) {
            // type: 'success', 'error', 'info'
            statusMessage.textContent = message;
            if (type === 'success') {
                statusIcon.textContent = '✅';
                statusBox.style.background = '#e2f3e8';
                statusBox.style.borderLeftColor = '#1e8f5e';
            } else if (type === 'error') {
                statusIcon.textContent = '❌';
                statusBox.style.background = '#ffefed';
                statusBox.style.borderLeftColor = '#c74a4a';
            } else {
                statusIcon.textContent = '⚡';
                statusBox.style.background = '#eaf1f7';
                statusBox.style.borderLeftColor = '#3b8fc2';
            }
        }

        // 按钮点击事件
        copyBtn.addEventListener('click', () => {
            // 先根据输入框更新预览 (保证预览和即将复制的内容完全一致)
            const cleanText = updatePreviewFromInput();   // 同时更新了preview和计数

            // 如果没有内容 (但空字符串也可以复制)
            if (cleanText.length === 0) {
                // 仍然可以复制，但提示一下
                // 继续执行复制，但状态提醒
            }

            // 开始复制 (使用预览区的文本，当然和cleanText一样)
            const textToCopy = previewTextarea.value;   // 其实就是 cleanText

            copyTextToClipboard(textToCopy, 
                () => {
                    // 成功回调
                    const len = textToCopy.length;
                    let successMsg = `复制成功！已去除回车 (${len} 个字符)`;
                    if (len === 0) {
                        successMsg = '复制成功 (内容为空)';
                    } else {
                        // 尝试显示前一小段作为预览
                        const snippet = textToCopy.length > 35 ? textToCopy.substring(0, 35) + '…' : textToCopy;
                        successMsg += ` ——  "${snippet}"`;
                    }
                    setStatus('success', successMsg);
                },
                (err) => {
                    // 失败回调
                    console.warn('复制失败:', err);
                    setStatus('error', '复制失败。可手动选择预览文本复制 (Ctrl+C)');
                }
            );
        });

        // 可选: 点击预览区域不产生意外 (保持友好)
        previewTextarea.addEventListener('click', () => {
            // 轻提示: 预览区只读，但可手动选择复制 (如果自动复制失效)
            // 为了避免干扰，只短暂显示提示，但不强求
            if (previewTextarea.value.length > 0) {
                // 只是瞬间提示，不影响现有状态 (若半秒内没覆盖)
                if (statusMessage.textContent.includes('失败') || statusMessage.textContent.includes('就绪')) {
                    // 不干扰错误显示，仅当状态闲置时显示提示
                }
            }
        });

        // 增加一个细节：双击预览区全选内容（方便手动复制）
        previewTextarea.addEventListener('dblclick', () => {
            previewTextarea.select();
            setStatus('info', '预览文本已选中，可按 Ctrl+C 复制');
        });

        // 同时，如果从预览区手动复制，不会影响我们的状态，但保持用户友好
        // 额外: 输入框手动变化后，状态可重置为就绪 (但不是必须)
        inputTextarea.addEventListener('focus', () => {
            // 仅当状态不是错误时重置为普通提示，以免用户困惑
            if (!statusMessage.textContent.includes('失败')) {
                setStatus('info', '编辑中… 点击按钮去除回车并复制');
            }
        });

        // 处理字符计数边框内更新
        // 已经通过 input 事件触发 updatePreviewFromInput，包含了计数更新

        // 极少数情况: 通过脚本修改输入框值，不会触发input事件，但用户通常不会这样。
        // 但为了更健壮，可以在按钮点击时总是从输入框重新计算（已经做了）
        // 已经满足要求。
    })();
</script>
</body>
</html>
